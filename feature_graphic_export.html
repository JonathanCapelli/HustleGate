<!DOCTYPE html>
<html>
<head>
    <title>HustleGate Feature Graphic Export</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #222; margin: 0; font-family: Arial; color: white; }
        canvas { border: 1px solid #555; max-width: 90vw; }
        button { margin-top: 20px; padding: 12px 24px; font-size: 18px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 8px; }
        button:hover { background: #388E3C; }
    </style>
</head>
<body>
    <h2>HustleGate - Feature Graphic 1024x500</h2>
    <canvas id="canvas" width="1024" height="500"></canvas>
    <button onclick="downloadPNG()">Télécharger PNG 1024x500</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Gradient background
        const grad = ctx.createLinearGradient(0, 0, 1024, 500);
        grad.addColorStop(0, '#1B5E20');
        grad.addColorStop(0.5, '#2E7D32');
        grad.addColorStop(1, '#43A047');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1024, 500);

        // Subtle pattern dots
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        for (let x = 0; x < 1024; x += 30) {
            for (let y = 0; y < 500; y += 30) {
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Draw icon on the left side
        function drawIcon(offsetX, offsetY, s) {
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(s, s);

            // Shield
            ctx.beginPath();
            ctx.moveTo(54, 18);
            ctx.lineTo(82, 30);
            ctx.lineTo(82, 56);
            ctx.bezierCurveTo(82, 72, 70, 84, 54, 92);
            ctx.bezierCurveTo(38, 84, 26, 72, 26, 56);
            ctx.lineTo(26, 30);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.fill();

            // Inner shield
            ctx.beginPath();
            ctx.moveTo(54, 22);
            ctx.lineTo(78, 32);
            ctx.lineTo(78, 55);
            ctx.bezierCurveTo(78, 69, 67, 80, 54, 87);
            ctx.bezierCurveTo(41, 80, 30, 69, 30, 55);
            ctx.lineTo(30, 32);
            ctx.closePath();
            ctx.fillStyle = '#1B5E20';
            ctx.fill();

            // Dumbbell bar
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(38, 52, 32, 4);
            // Left weight
            ctx.fillRect(33, 46, 7, 16);
            // Right weight
            ctx.fillRect(68, 46, 7, 16);
            // Left cap
            ctx.fillRect(30, 49, 3, 10);
            // Right cap
            ctx.fillRect(75, 49, 3, 10);

            // Lock keyhole
            ctx.beginPath();
            ctx.arc(54, 42, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(51, 47.2);
            ctx.lineTo(51, 50);
            ctx.bezierCurveTo(51, 51.7, 52.3, 53, 54, 53);
            ctx.bezierCurveTo(55.7, 53, 57, 51.7, 57, 50);
            ctx.lineTo(57, 47.2);
            ctx.closePath();
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();

            // Lightning bolt
            ctx.beginPath();
            ctx.moveTo(52, 64);
            ctx.lineTo(56, 64);
            ctx.lineTo(54, 70);
            ctx.lineTo(59, 70);
            ctx.lineTo(51, 80);
            ctx.lineTo(53, 73);
            ctx.lineTo(49, 73);
            ctx.closePath();
            ctx.fillStyle = '#FFD600';
            ctx.fill();

            ctx.restore();
        }

        // Main icon
        drawIcon(100, 45, 3.8);

        // Title "HustleGate"
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 90px Arial, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';

        // Shadow
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 3;
        ctx.fillText('HustleGate', 520, 190);

        // Slogan
        ctx.shadowBlur = 5;
        ctx.font = '32px Arial, sans-serif';
        ctx.fillStyle = '#C8E6C9';
        ctx.fillText('Fais du sport. Débloque tes applis.', 520, 280);

        // Reset shadow
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        // Exercise icons row at bottom
        const exercises = ['💪', '🏋️', '🦵', '🧘', '🏃', '⚡'];
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        exercises.forEach((emoji, i) => {
            ctx.fillText(emoji, 550 + i * 80, 380);
        });

        // Bottom accent line
        const lineGrad = ctx.createLinearGradient(0, 480, 1024, 480);
        lineGrad.addColorStop(0, 'rgba(255,214,0,0)');
        lineGrad.addColorStop(0.3, '#FFD600');
        lineGrad.addColorStop(0.7, '#FFD600');
        lineGrad.addColorStop(1, 'rgba(255,214,0,0)');
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, 480);
        ctx.lineTo(1024, 480);
        ctx.stroke();
    </script>

    <script>
        function downloadPNG() {
            const link = document.createElement('a');
            link.download = 'hustlegate_feature_graphic_1024x500.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
